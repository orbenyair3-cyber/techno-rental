<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>אזור מנהל</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="admin">
  <header class="hero"><div class="container"><h1>אזור מנהל</h1><p>ניהול ציוד: הוספה, עריכה, זמינות, תחזוקה</p></div></header>
  <main class="container">
    <section id="adminLoginPanel" class="panel">
      <h2>כניסת מנהל</h2>
      <div class="form-grid">
        <div><label for="managerUser">שם משתמש</label><input id="managerUser" /></div>
        <div><label for="managerPass">סיסמה</label><input id="managerPass" type="password" /></div>
      </div>
      <button id="managerLoginBtn" class="primary">כניסה</button>
      <p id="adminLoginMsg" class="small"></p>
    </section>

    <section id="adminPanel" class="panel" style="display:none">
      <div class="actions">
        <button class="admin-tab-btn primary" data-tab="add">הוספת כלי</button>
        <button class="admin-tab-btn secondary" data-tab="edit">עריכת כלי</button>
        <button class="admin-tab-btn secondary" data-tab="availability">זמינות כלי</button>
        <button class="admin-tab-btn secondary" data-tab="maintenance">תחזוקה</button>
        <button id="adminLogoutBtn" class="secondary">התנתקות</button>
      </div>

      <div id="tab-add" class="admin-tab">
        <div class="form-grid">
          <div><label for="newToolName">שם כלי</label><input id="newToolName" /></div>
          <div><label for="newToolPrice">מחיר</label><input id="newToolPrice" type="number" /></div>
          <div><label for="newToolDeposit">פיקדון</label><input id="newToolDeposit" type="number" /></div>
          <div><label for="newToolMaxDays">מקס' ימים</label><input id="newToolMaxDays" type="number" /></div>
          <div><label for="newToolCategory">קטגוריה</label><input id="newToolCategory" /></div>
          <div><label for="newToolImage">תמונה</label><input id="newToolImage" /></div>
          <div style="grid-column:1/-1"><label for="newToolDesc">תיאור</label><textarea id="newToolDesc"></textarea></div>
        </div>
        <button id="addToolBtn" class="primary">הוסף כלי</button>
      </div>

      <div id="tab-edit" class="admin-tab hidden">
        <div class="form-grid">
          <div><label for="editToolSelect">בחר כלי</label><select id="editToolSelect"></select></div>
          <div><label for="editToolName">שם</label><input id="editToolName" /></div>
          <div><label for="editToolPrice">מחיר</label><input id="editToolPrice" type="number" /></div>
          <div><label for="editToolDeposit">פיקדון</label><input id="editToolDeposit" type="number" /></div>
          <div><label for="editToolMaxDays">מקס' ימים</label><input id="editToolMaxDays" type="number" /></div>
          <div><label for="editToolCategory">קטגוריה</label><input id="editToolCategory" /></div>
          <div><label for="editToolImage">תמונה</label><input id="editToolImage" /></div>
          <div><label for="editToolStatus">סטטוס</label><select id="editToolStatus"><option value="available">זמין</option><option value="maintenance">בתחזוקה</option></select></div>
          <div><label for="editToolBusyDates">תאריכים תפוסים (פסיק)</label><input id="editToolBusyDates" /></div>
          <div style="grid-column:1/-1"><label for="editToolDesc">תיאור</label><textarea id="editToolDesc"></textarea></div>
        </div>
        <button id="saveEditToolBtn" class="primary">שמור עריכה</button>
      </div>

      <div id="tab-availability" class="admin-tab hidden">
        <div class="form-grid">
          <div><label for="availToolSelect">בחר כלי</label><select id="availToolSelect"></select></div>
          <div><label for="busyDates">תאריכים תפוסים (פסיק)</label><input id="busyDates" /></div>
        </div>
        <button id="saveBusyDatesBtn" class="primary">שמור זמינות</button>
      </div>

      <div id="tab-maintenance" class="admin-tab hidden">
        <div class="form-grid">
          <div><label for="maintToolSelect">בחר כלי</label><select id="maintToolSelect"></select></div>
          <div><label for="maintStatus">סטטוס</label><select id="maintStatus"><option value="available">זמין</option><option value="maintenance">בתחזוקה</option></select></div>
        </div>
        <button id="saveMaintBtn" class="primary">שמור תחזוקה</button>
      </div>

      <p id="adminActionMsg" class="small"></p>
    </section>

    <section id="adminToolsPanel" class="panel" style="display:none">
      <h3>כלים קיימים</h3>
      <div id="adminToolsList" class="list"></div>
    </section>
  </main>

  <footer>© Techno Electric</footer>
  <button id="accessBtn" class="access-btn">♿</button>
  <aside id="accessPanel" class="access-panel"></aside>
  <script src="app.js"></script>
</body>
</html>
